<!DOCTYPE html>
<html>
<head>
    <title>AI-Based Mock Interview Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f9; }
        .main-card { border-radius: 15px; border: none; min-height: 400px; }
        .badge-status { font-size: 1rem; padding: 8px 16px; border-radius: 50px; }
    </style>
</head>
<body class="container py-5">
    <div class="row g-4">
        <div class="col-md-7">
            <div class="card shadow rounded-3 overflow-hidden">
                <img src="{{ url_for('video_feed') }}" class="img-fluid" alt="Webcam Behavioral Analysis">
            </div>
        </div>
        <div class="col-md-5">
            <div class="card main-card shadow p-4 d-flex flex-column">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="text-secondary mb-0">AI Session</h5>
                    <span id="statusBadge" class="badge bg-primary badge-status">Initializing...</span>
                </div>
                <hr>
                <div class="flex-grow-1 d-flex align-items-center">
                    <h3 id="questionText" class="text-center w-100">Click to Begin</h3>
                </div>
                <div class="mt-4">
                    <button id="mainBtn" onclick="triggerAction()" class="btn btn-primary btn-lg w-100 py-3">Start Interview</button>
                    <div id="statusText" class="text-muted small text-center mt-2">Ready for analysis.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateUI() {
            fetch('/get_status')
                .then(r => r.json())
                .then(data => {
                    const btn = document.getElementById('mainBtn');
                    const statusText = document.getElementById('statusText');
                    const questionText = document.getElementById('questionText');
                    const badge = document.getElementById('statusBadge');

                    statusText.innerText = data.status;
                    questionText.innerText = data.current_question;
                    badge.innerText = data.current_state;

                    // BUTTON LOGIC MAPPING
                    if (data.is_busy) {
                        btn.disabled = true;
                        btn.innerText = "Please Wait...";
                        btn.className = "btn btn-secondary btn-lg w-100 py-3";
                    } else if (data.current_state === "IDLE") {
                        btn.innerText = "Start Interview";
                        btn.className = "btn btn-primary btn-lg w-100 py-3";
                    } else if (data.current_state === "QUESTION") {
                        btn.innerText = "Start Recording Answer";
                        btn.className = "btn btn-danger btn-lg w-100 py-3";
                    } else if (data.current_state === "RECORDING") {
                        btn.innerText = "Submit & Next Question";
                        btn.className = "btn btn-success btn-lg w-100 py-3";
                    } else if (data.current_state === "COMPLETE") {
                        btn.disabled = true;
                        btn.innerText = "Interview Finished";
                        btn.className = "btn btn-dark btn-lg w-100 py-3";
                    }
                });
        }

        function triggerAction() {
            fetch('/next_action', { method: 'POST' });
        }

        setInterval(updateUI, 1000);
    </script>
</body>
</html>
